[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fluentpyside"
version = "0.0.0"
description = "Fluent WinUI3 QML style helper for PySide6 (copies assets from local PySide6 install)"
readme = "README.md"
requires-python = ">=3.8"
authors = [ { name = "", email = "" } ]
dependencies = ["PySide6>=6.6"]

[tool.setuptools.packages.find]
where = ["."]

[project.urls]
Homepage = "https://github.com/<your-account>/FluentPySide"

[tool.setuptools.package-data]
# include the package-local fluent_winui3 folder files so they are part of the wheel/sdist
"fluentpyside" = ["fluent_winui3/**/*"]
